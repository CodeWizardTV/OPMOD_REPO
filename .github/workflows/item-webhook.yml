name: Item Webhook

on:
  push:
    branches: [main]
    paths:
      - 'items/**.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send Discord webhooks
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_ITEM_WEBHOOK }}
        run: |
          git diff --name-status HEAD~1 HEAD -- 'items/*.json' | while IFS=$'\t' read -r status old new; do
            # R090 old.json new.json  →  status=R090, old=alter Pfad, new=neuer Pfad
            # A/M/D foo.json          →  status=A/M/D, old=Pfad,      new=leer

            # Rename: treat new file as Added
            if [[ "$status" == R* ]]; then
              file="$new"
              status="A"
            else
              file="$old"
            fi

            [ -z "$file" ] && continue
            echo "[$status] $file"

            if [ "$status" = "D" ]; then
              TMPFILE=$(mktemp --suffix=.json)
              git show HEAD~1:"$file" > "$TMPFILE"
              node .github/scripts/send-item-webhook.mjs "$TMPFILE" D
              rm -f "$TMPFILE"
            else
              node .github/scripts/send-item-webhook.mjs "$file" "$status"
            fi

            sleep 1
          done
